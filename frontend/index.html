<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>AI Face Detection Challenge</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }

        body {
            background: #000;
            min-height: 100vh;
            user-select: none;
            overflow: hidden;
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
        }

        .nav-tabs {
            display: flex;
            gap: 1rem;
        }

        .tab-btn {
            padding: 0.6rem 1.2rem;
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.7);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            border-color: #fff;
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }

        .tab-btn:hover:not(.active) {
            border-color: rgba(255, 255, 255, 0.6);
            color: rgba(255, 255, 255, 0.9);
        }

        /* Split screen layout */
        .split-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
        }

        .split-side {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .split-side.left {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
        }

        .split-side.right {
            background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%);
        }

        .split-side:hover {
            flex: 1.1;
        }

        .split-side:hover .side-content {
            transform: scale(1.05);
        }

        .side-content {
            text-align: center;
            transition: transform 0.3s ease;
            padding: 2rem;
        }

        .side-icon {
            font-size: 6rem;
            margin-bottom: 1rem;
            opacity: 0.9;
        }

        .side-title {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .side-subtitle {
            font-size: 1.5rem;
            opacity: 0.8;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        /* Center content overlay */
        .center-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            text-align: center;
            pointer-events: none;
        }

        .question-display {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            padding: 1.5rem 3rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .question-text {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .progress-text {
            font-size: 1.2rem;
            opacity: 0.8;
        }

        .image-container {
            position: relative;
            margin-bottom: 2rem;
        }

        .main-image {
            width: 300px;
            height: 300px;
            border-radius: 20px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            object-fit: cover;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .main-image:hover {
            transform: scale(1.02);
        }

        /* Comparison mode adjustments */
        .comparison-mode .split-container {
            display: none;
        }

        .comparison-mode .comparison-overlay {
            display: flex !important;
        }

        .comparison-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(45deg, #3498db 0%, #3498db 49%, #9b59b6 51%, #9b59b6 100%);
        }

        .comparison-content {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            gap: 4rem;
            align-items: center;
        }

        .comparison-option {
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .comparison-option:hover {
            transform: scale(1.05);
        }

        .comparison-image {
            width: 250px;
            height: 250px;
            border-radius: 20px;
            border: 4px solid rgba(255, 255, 255, 0.5);
            object-fit: cover;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            margin-bottom: 1rem;
        }

        .comparison-label {
            font-size: 2rem;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.7);
            padding: 0.5rem 1rem;
            border-radius: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        /* Results screen */
        .results-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            z-index: 200;
        }

        .results-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            max-width: 600px;
            width: 90%;
        }

        .results-title {
            font-size: 4rem;
            font-weight: bold;
            margin-bottom: 2rem;
            color: #2ecc71;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .score-display {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            background: rgba(0, 0, 0, 0.5);
            padding: 1.5rem;
            border-radius: 15px;
        }

        .breakdown-display {
            background: rgba(0, 0, 0, 0.3);
            padding: 1.5rem;
            border-radius: 15px;
            margin-bottom: 2rem;
            max-height: 300px;
            overflow-y: auto;
            text-align: left;
        }

        .restart-btn {
            padding: 1rem 3rem;
            font-size: 1.5rem;
            background: #3498db;
            border: none;
            border-radius: 15px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .restart-btn:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
        }

        /* Webcam feed in corner */
        .webcam-feed {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 200px;
            height: 150px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            z-index: 500;
            background: rgba(0, 0, 0, 0.5);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .webcam-feed:hover {
            transform: scale(1.1);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .webcam-feed canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }

        .webcam-feed.hidden {
            display: none;
        }

        /* Webcam toggle button */
        .webcam-toggle {
            position: fixed;
            bottom: 180px;
            right: 20px;
            padding: 0.5rem 1rem;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 500;
            font-size: 0.9rem;
        }

        .webcam-toggle:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.6);
        }

        /* Instructions */
        .instructions {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 1rem 2rem;
            border-radius: 15px;
            z-index: 50;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Feedback animations */
        .feedback-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 150;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .feedback-flash.show {
            opacity: 0.3;
        }

        .feedback-flash.correct {
            background: #2ecc71;
        }

        .feedback-flash.incorrect {
            background: #e74c3c;
        }

        /* Fix comparison mode question positioning */
        .comparison-overlay .center-overlay {
            top: 15% !important;
            pointer-events: none;
            z-index: 200;
        }

        /* Mobile responsiveness */
        @media (max-width: 768px) {
            .split-container {
                flex-direction: column;
            }
            
            .side-title {
                font-size: 2rem;
            }
            
            .side-subtitle {
                font-size: 1.2rem;
            }
            
            .main-image {
                width: 250px;
                height: 250px;
            }
            
            .comparison-content {
                flex-direction: column;
                gap: 2rem;
            }
            
            .comparison-image {
                width: 200px;
                height: 200px;
            }

            .webcam-feed {
                width: 150px;
                height: 112px;
                bottom: 10px;
                right: 10px;
            }

            .webcam-toggle {
                bottom: 130px;
                right: 10px;
                padding: 0.4rem 0.8rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">🎉 AI Face Detection Workshop</div>
        <div class="nav-tabs">
            <button class="tab-btn active" data-mode="single">Single Image</button>
            <button class="tab-btn" data-mode="comparison">Side by Side</button>
        </div>
    </header>

    <!-- Single Image Mode - Split Screen -->
    <div class="split-container" id="split-container">
        <div class="split-side left" id="ai-side">
            <div class="side-content">
                <div class="side-icon">🤖</div>
                <div class="side-title">AI</div>
                <div class="side-subtitle">Generated</div>
            </div>
        </div>
        
        <div class="split-side right" id="real-side">
            <div class="side-content">
                <div class="side-icon">👤</div>
                <div class="side-title">REAL</div>
                <div class="side-subtitle">Person</div>
            </div>
        </div>
    </div>

    <!-- Center overlay for question and image -->
    <div class="center-overlay" id="center-overlay">
        <div class="question-display">
            <div class="question-text" id="question-text">Is this face real or AI-generated?</div>
            <div class="progress-text" id="progress">Image 1 of 10</div>
        </div>
        
        <div class="image-container">
            <img class="main-image" id="face" src="assets/faces/1_rwm003.jpg" alt="Face">
        </div>
    </div>

    <!-- Comparison Mode Overlay -->
    <div class="comparison-overlay" id="comparison-overlay">
        <div class="comparison-content">
            <div class="comparison-option" id="option-a">
                <img class="comparison-image" id="image-a" src="assets/faces/1_rwm003.jpg" alt="Option A">
                <div class="comparison-label">A</div>
            </div>
            
            <div class="comparison-option" id="option-b">
                <img class="comparison-image" id="image-b" src="assets/faces/2_swf014.jpg" alt="Option B">
                <div class="comparison-label">B</div>
            </div>
        </div>
        
        <div class="center-overlay">
            <div class="question-display">
                <div class="question-text">Which one do you think is Real?</div>
                <div class="progress-text" id="progress-comparison">Image 1 of 10</div>
            </div>
        </div>
    </div>

    <!-- Results Screen -->
    <div class="results-overlay" id="results">
        <div class="results-content">
            <div class="results-title">🎯 Challenge Complete!</div>
            <div class="score-display" id="score"></div>
            <div class="breakdown-display" id="breakdown"></div>
            <button class="restart-btn" id="restart-btn">🔄 Start Over</button>
        </div>
    </div>

    <!-- Webcam feed - visible in corner -->
    <div class="webcam-feed" id="webcam-container">
        <canvas id="webcam-view" width="400" height="300"></canvas>
    </div>

    <!-- Webcam toggle button -->
    <button class="webcam-toggle" id="webcam-toggle">📹 Hide Camera</button>

    <!-- Instructions -->
    <div class="instructions">
        Click sides • Arrow keys • Raise left/right hand to vote
    </div>

    <!-- Feedback flash overlay -->
    <div class="feedback-flash" id="feedback-flash"></div>

    <!-- Keep video hidden - only used for processing -->
    <div style="display: none;">
        <video id="webcam" autoplay playsinline muted></video>
        <div id="webcam-status"></div>
    </div>

    <!-- MediaPipe Scripts -->
    <script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js"></script>
    <script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils@0.6.1629159505/control_utils.js"></script>
    <script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1620248257/drawing_utils.js"></script>
    <script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js"></script>

    <!-- Game Scripts -->
    <script src="js/gameState.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/imageLoader.js"></script>
    <script src="js/feedback.js"></script>
    <script src="js/webcam.js"></script>
    <script src="js/singleMode.js"></script>
    <script src="js/comparisonMode.js"></script>
    <script src="js/results.js"></script>
    <script src="js/main.js"></script>

    <script>
        // Webcam toggle functionality
        document.addEventListener('DOMContentLoaded', () => {
            const webcamToggle = document.getElementById('webcam-toggle');
            const webcamContainer = document.getElementById('webcam-container');
            
            if (webcamToggle && webcamContainer) {
                webcamToggle.addEventListener('click', () => {
                    webcamContainer.classList.toggle('hidden');
                    webcamToggle.textContent = webcamContainer.classList.contains('hidden') ? '📹 Show Camera' : '📹 Hide Camera';
                });
            }
        });
    </script>
</body>
</html>
